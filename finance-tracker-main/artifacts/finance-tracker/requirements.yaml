packages:
  "framer-motion": "Smooth page transitions and micro-interactions"
  "react-hook-form": "Robust form state management"
  "@hookform/resolvers": "Zod schema validation for forms"
  "date-fns": "Date formatting and manipulation"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"

images:
  - path: "artifacts/finance-tracker/public/images/login-bg.png"
    description: "A premium, abstract 3D mesh gradient background in rich teal, emerald green, and deep slate, with soft volumetric lighting and subtle glassmorphism effects. Clean, professional, and modern."
